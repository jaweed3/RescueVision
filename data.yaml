# RescueVision Edge - Dataset Configuration
# VisDrone-DET 2019 (pedestrian class only, remapped to class 0)

path: .                      # Root = repo directory (relative paths)
train: train_data/images/train
val: train_data/images/val
test: test_data/images

# Classes
nc: 1                        # Number of classes (pedestrian only)
names:
  0: pedestrian

# Dataset info (for documentation)
# Source: https://github.com/VisDrone/VisDrone-Dataset
# Original classes: pedestrian(1), people(2), bicycle(3), car(4), van(5),
#                   truck(6), tricycle(7), awning-tricycle(8), bus(9), motor(10)
# We filter to class 1 (pedestrian) only and remap to 0.
# Total samples (approx): 6471 train, 548 val, 1610 test
